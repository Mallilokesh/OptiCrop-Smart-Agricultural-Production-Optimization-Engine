<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OptiCrop Recommendation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <main class="app-shell">
      <section class="intro">
        <p class="eyebrow">AI crop planning</p>
        <h1>OptiCrop</h1>
        <p>Enter soil nutrients and local weather conditions to receive a data-driven crop recommendation.</p>
      </section>

      <section class="form-panel" aria-label="Crop recommendation form">
        <form action="{{ url_for('predict') }}" method="post" novalidate>
          <div class="row g-3">
            {% for field in fields %}
            <div class="col-md-6">
              <label class="form-label" for="{{ field.name }}">{{ field.label }}</label>
              <input
                class="form-control {% if errors.get(field.name) %}is-invalid{% endif %}"
                type="number"
                id="{{ field.name }}"
                name="{{ field.name }}"
                min="{{ field.min }}"
                max="{{ field.max }}"
                step="{{ field.step }}"
                value="{{ values.get(field.name, '') }}"
                required>
              {% if errors.get(field.name) %}
              <div class="invalid-feedback">{{ errors[field.name] }}</div>
              {% endif %}
            </div>
            {% endfor %}
          </div>
          <div class="actions">
            <button class="btn btn-success btn-lg" type="submit">Recommend Crop</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
